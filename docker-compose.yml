services:
  telegram-drive-web:
    build: .
    container_name: telegram-drive-web
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8080"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/api/health', timeout=5).read()"]
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 20s
